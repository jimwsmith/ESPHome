esphome:
  name: ${esphome_name}

globals:
  - id: no2_R0
    type: float
    restore_value: yes
    initial_value: '1.07'
  - id: co_R0
    type: float
    restore_value: yes
    initial_value: '3.21'
  - id: tvoc_R0
    type: float
    restore_value: yes
    initial_value: '1.0'
  - id: ethanol_R0
    type: float
    restore_value: yes
    initial_value: '1.0'
  - id: no2_raw
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: co_raw
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: tvoc_raw
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: ethanol_raw
    type: float
    restore_value: no
    initial_value: '0.0'

sensor:
  - platform: grove_gas_mc_v2
    nitrogen_dioxide:
      name: "Nitrogen Dioxide"
      id: no2
      unit_of_measurement: "ppm"
      device_class: "carbon_monoxide" #fudge to get ppm to display
      accuracy_decimals: 2
      filters:
        - lambda: |-
            float Gas_Volt;
            float RS_gas;
            float R0;
            float ratio;
            float lgPPM;
            float PPM;

            id(no2_raw) = x;
            // return x - id(no2_offset);
            Gas_Volt = (x/1024)*3.3;
            RS_gas = (3.3-Gas_Volt)/Gas_Volt;

            R0 = id(no2_R0); //measured on ambient air
            ratio = RS_gas/R0;
            //ratio = 4.7; //for tests of the calibration curve

            lgPPM = (log10(ratio) * + 1.9) - 0.2; //+2 -0.3
            PPM = pow(10,lgPPM);
            // ESP_LOGI("NO2", "Raw: %.2f, Volt: %.2f, RS_gas: %.2f, Ratio: %.2f, PPM: %.2f", x, Gas_Volt, RS_gas, ratio, PPM);
            return PPM;

      on_value: #When value changes update LVGL display
        - script.execute: update_bar_no2
    ethanol:
      name: "Ethanol"
      id: ethanol
      filters:
        - lambda: |-
            id(ethanol_raw) = x;
            // return x - id(ethanol_offset);
            float Gas_Volt;
            float RS_gas;
            float R0;
            float ratio;
            float lgPPM;
            float PPM;

            Gas_Volt = (x/1024)*3.3;
            RS_gas = (3.3-Gas_Volt)/Gas_Volt;

            R0 = id(ethanol_R0); //measured on ambient air
            ratio = RS_gas/R0;
            //ratio = 4.7; //for tests of the calibration curve

            lgPPM = (log10(ratio) * + 1.9) - 0.2; //+2 -0.3
            PPM = pow(10,lgPPM);
            // ESP_LOGI("Ethanol", "Raw: %.2f, Volt: %.2f, RS_gas: %.2f, Ratio: %.2f, PPM: %.2f", x, Gas_Volt, RS_gas, ratio, PPM);
            return PPM;

    carbon_monoxide:
      name: "Carbon Monoxide"
      id: co
      accuracy_decimals: 2
      filters:
        - lambda: |-
            id(co_raw) = x;
            // return x - id(co_offset); 
            float Gas_Volt;
            float RS_gas;
            float R0;
            float ratio;
            float lgPPM;
            float PPM;

            Gas_Volt = (x/1024)*3.3;
            RS_gas = (3.3-Gas_Volt)/Gas_Volt;

            R0 = id(co_R0); //measured on ambient air
            ratio = RS_gas/R0;
            //ratio = 4.7; //for tests of the calibration curve

            lgPPM = (log10(ratio) * - 2.82) - 0.12; //- 3.82) - 0.66; - default - 2.82) - 0.12; - best for range up to 150 ppm
            PPM = pow(10,lgPPM);
            // ESP_LOGI("CO", "Raw: %.2f, Volt: %.2f, RS_gas: %.2f, Ratio: %.2f, PPM: %.2f", x, Gas_Volt, RS_gas, ratio, PPM);
            return PPM;

      on_value: #When value changes update LVGL display
        - script.execute: update_bar_co
    tvoc:
      name: "Volatile Organic Compounds"
      id: tvoc
      unit_of_measurement: "ppm"
      device_class: "volatile_organic_compounds_parts"
      filters:
        - lambda: |-
            id(tvoc_raw) = x;
            // return x - id(tvoc_offset);
            float Gas_Volt;
            float RS_gas;
            float R0;
            float ratio;
            float lgPPM;
            float PPM;

            Gas_Volt = (x/1024)*3.3;
            RS_gas = (3.3-Gas_Volt)/Gas_Volt;

            R0 = id(tvoc_R0); //measured on ambient air
            ratio = RS_gas/R0;
            //ratio = 4.7; //for tests of the calibration curve

            lgPPM = (log10(ratio) * + 1.9) - 0.2; //+2 -0.3 - 2.82) - 0.12; - best for range up to 150 ppm
            PPM = pow(10,lgPPM);
            // ESP_LOGI("VOC", "Raw: %.2f, Volt: %.2f, RS_gas: %.2f, Ratio: %.2f, PPM: %.2f", x, Gas_Volt, RS_gas, ratio, PPM);
            return PPM;

button:
  - platform: template
    name: "4ch Gas Manual calibration"
    id: gas4ch_calibrate
    entity_category: "config"
    on_press:
      # Recalcuate R0 for each gas based on current raw value, which should be the value in clean air. This is a manual calibration step that can be triggered by the user when they know the sensor is in clean air conditions. It will update the R0 values used in the calculations for each gas.
      then:
        - globals.set:
            id: no2_R0
            value: !lambda |-
              float Gas_Volt;
              float R0_gas;
              Gas_Volt = (id(no2_raw)/1024)*3.3;
              R0_gas = (3.3-Gas_Volt)/Gas_Volt;
              ESP_LOGI("no2_R0", "Old: %.2f, New: %.2f", id(no2_R0), R0_gas);
              return R0_gas;
        - globals.set:
            id: co_R0
            value: !lambda |-
              float Gas_Volt;
              float R0_gas;
              Gas_Volt = (id(co_raw)/1024)*3.3;
              R0_gas = (3.3-Gas_Volt)/Gas_Volt;
              ESP_LOGI("co_R0", "Old: %.2f, New: %.2f", id(co_R0), R0_gas);
              return R0_gas;
        - globals.set:
            id: tvoc_R0
            value: !lambda |-
              float Gas_Volt;
              float R0_gas;
              Gas_Volt = (id(tvoc_raw)/1024)*3.3;
              R0_gas = (3.3-Gas_Volt)/Gas_Volt;
              ESP_LOGI("tvoc_R0", "Old: %.2f, New: %.2f", id(tvoc_R0), R0_gas);
              return R0_gas;
        - globals.set:
            id: ethanol_R0
            value: !lambda |-
              float Gas_Volt;
              float R0_gas;
              Gas_Volt = (id(ethanol_raw)/1024)*3.3;
              R0_gas = (3.3-Gas_Volt)/Gas_Volt;
              ESP_LOGI("ethanol_R0", "Old: %.2f, New: %.2f", id(ethanol_R0), R0_gas);
              return R0_gas;