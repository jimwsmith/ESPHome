# Stub file that simply defines specific unit name for a AQI Sensor system on a M5Stack Fire Unit

substitutions:
  friendly_name: "Fire8" #AINSLEY Boat
  esphome_name: "fire8"

esphome:
  name: ${esphome_name}
  build_path: C:/EsphomeTemp/${esphome_name}

packages:
  fireaqi: !include FireAQI.yaml
  m5stackfire: !include M5StackFire.yaml

external_components:
  - source: github://pr#14381
    components: [binary_sensor, number, sensor, switch, text_sensor]
    refresh: 1h